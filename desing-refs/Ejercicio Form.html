      const mt = MTHEME[m];
      const style = on
        ? { borderColor:mt.pill.bc, background:mt.pill.bg, color:mt.pill.tc, fontWeight:600 }
        : {};
      return el("button",{
        className:"pill"+(on?" pill-active":""),
        style,
        onClick:()=>setForm(f=>({...f,muscle:m}))
      }, m);
    }

    function EquipPill({ eq }) {
      const on = form.equip === eq;
      const style = on
        ? { borderColor:"var(--gc-accent-soft-border)", background:"var(--gc-accent-soft-surface)", color:"var(--gc-accent-bright)", fontWeight:600 }
        : {};
      return el("button",{
        className:"pill"+(on?" pill-active":""),
        style,
        onClick:()=>setForm(f=>({...f,equip:eq}))
      }, eq);
    }

    return el(React.Fragment, null,
      el("div",{className:"overlay",onClick:onClose}),
      el("div",{className:"drawer"},
        el("div",{className:"drw-accentline"}),

        /* Header */
        el("div",{className:"drw-header"},
          el("div",{className:"drw-header-row"},
            el("div",{className:"drw-mode-icon"},
              el(Ic,{d:isEdit?I.pencil:I.plus,size:18})
            ),
            el("div",{style:{flex:1}},
              el("h2",{className:"drw-title"},isEdit?"Editar ejercicio":"Nuevo ejercicio"),
              el("p",{className:"drw-sub"},isEdit
                ? "Modificá los datos y guardá los cambios."
                : "Completá los campos para agregar un ejercicio al catálogo.")
            ),
            el("button",{className:"drw-close",onClick:onClose},el(Ic,{d:I.x,size:13}))
          )
        ),

        /* Body */
        el("div",{className:"drw-body"},

          /* Live preview */
          el("div",{className:"form-section"},
            el("div",{className:"preview-lbl"},"Vista previa"),
            el("div",{className:"preview-card"},
              el("div",{className:"preview-thumb",style:{background:mtheme.grad}},
                el(Ic,{d:I.dumbbell,size:14,color:"rgba(255,255,255,.22)"})
              ),
              el("div",{className:"preview-info"},
                el("div",{className:"preview-name"+(form.name.trim()?"":" placeholder")},
                  form.name.trim() || "Nombre del ejercicio..."
                ),
                el("div",{className:"preview-badges"},
                  el("span",{className:"badge",style:{borderColor:mb.bc,background:mb.bg,color:mb.tc}},form.muscle),
                  el("span",{className:"badge",style:{borderColor:equipBadge.bc,background:equipBadge.bg,color:equipBadge.tc}},form.equip)
                )
              )
            )
          ),

          /* Nombre */
          el("div",{className:"form-section"},
            el("div",{className:"form-section-label"},"Información básica"),
            el("div",{className:"field-wrap"},
              el("span",{className:"field-icon"},el(Ic,{d:I.dumbbell,size:15})),
              el("input",{
                className:"field-input"+(nameErr?" err":""),
                placeholder:"Nombre del ejercicio",
                value:form.name,
                onChange:e=>setForm(f=>({...f,name:e.target.value})),
                onBlur:()=>touch("name")
              })
            ),
            nameErr && el("div",{className:"field-error"},"El nombre es obligatorio."),
            el("div",{style:{position:"relative"}},
              el("textarea",{
                className:"field-textarea"+(descErr?" err":""),
                placeholder:"Descripción breve — músculos trabajados, técnica clave...",
                value:form.desc,
                onChange:e=>setForm(f=>({...f,desc:e.target.value})),
                onBlur:()=>touch("desc")
              }),
              el("div",{className:"field-char"},form.desc.length+"/200")
            )
          ),

          /* Grupo muscular */
          el("div",{className:"form-section"},
            el("div",{className:"form-section-label"},"Grupo muscular"),
            el("div",{className:"pill-grid"},
              MUSCLES.map(m=>el(MuscPill,{key:m,m}))
            )
          ),

          /* Equipamiento */
          el("div",{className:"form-section"},
            el("div",{className:"form-section-label"},"Equipamiento"),
            el("div",{className:"pill-grid"},
              EQUIPS.map(eq=>el(EquipPill,{key:eq,eq}))
            )
          ),

          /* Video URL */
          el("div",{className:"form-section"},
            el("div",{className:"form-section-label"},"Video (opcional)"),
            el("div",{className:"field-wrap"},
              el("span",{className:"field-icon"},el(Ic,{d:I.link,size:15})),
              el("input",{
                className:"field-input",
                placeholder:"https://youtube.com/watch?v=...",
                value:form.video,
                onChange:e=>setForm(f=>({...f,video:e.target.value}))
              })
            ),
            isValidUrl && el("div",{className:"video-badge"},el(Ic,{d:I.check,size:12,color:"#4ade80"}),"URL válida")
          )
        ),

        /* Footer */
        el("div",{className:"drw-footer"},
          el("button",{className:"btn-ghost",onClick:onClose},"Cancelar"),
          el("button",{
            className:"btn-primary",
            disabled:!isValid,
            onClick:isValid?onSave:undefined
          },
            el(Ic,{d:isEdit?I.check:I.sparkles,size:14}),
            isEdit?"Guardar cambios":"Crear ejercicio"
          )
        )
      )
    );
  }

  /* ── DeleteConfirm ── */
  function DeleteConfirm({ exercise, onClose, onConfirm }) {
    return el("div",{className:"overlay overlay-center",onClick:onClose},
      el("div",{className:"del-modal",onClick:e=>e.stopPropagation()},
        el("div",{className:"del-icon"},el(Ic,{d:I.warning,size:22})),
        el("h3",{style:{margin:"0 0 7px",fontFamily:"var(--gc-font-display)",fontSize:"1.1rem",fontWeight:700,color:"#fff",letterSpacing:"-.04em"}},"Eliminar ejercicio"),
        el("p",{style:{margin:"0 0 22px",fontSize:13.5,color:"var(--gc-foreground-muted)",lineHeight:1.6}},
          "¿Seguro que querés eliminar ",el("strong",{style:{color:"#fff"}},exercise.name),"? Esta acción no se puede deshacer."
        ),
        el("div",{style:{display:"flex",gap:9,justifyContent:"flex-end"}},
          el("button",{className:"btn-ghost",onClick:onClose},"Cancelar"),
          el("button",{className:"btn-danger",onClick:onConfirm},el(Ic,{d:I.trash,size:13}),"Eliminar")
        )
      )
    );
  }

  /* ── Sidebar ── */
  function Sidebar() {
    const links = [
      {k:"cat",ic:I.book,l:"Catálogo",s:"Usuario"},
      {k:"rut",ic:I.grid,l:"Mis rutinas",s:"Usuario"},
      {k:"sem",ic:I.calendar,l:"Semana activa",s:"Usuario"},
      {k:"da", ic:I.shield,l:"Dashboard Admin",s:"Admin"},
      {k:"ej", ic:I.dumbbell,l:"Ejercicios",s:"Admin",active:true},
      {k:"ra", ic:I.clipboard,l:"Rutinas",s:"Admin"},
    ];
    const sections = [["Usuario",links.filter(l=>l.s==="Usuario")],["Gestión",links.filter(l=>l.s==="Admin")]];
    return el("aside",{className:"sidebar"},
      el("a",{href:"#",style:{display:"flex",alignItems:"center",gap:11,textDecoration:"none",marginBottom:26}},
        el("span",{style:{display:"grid",placeItems:"center",width:44,height:44,borderRadius:13,background:"#6335e8",border:"1px solid #5a30d6",boxShadow:"0 10px 26px rgba(72,39,158,.3)",fontFamily:"var(--gc-font-display)",fontWeight:700,fontSize:14,color:"#fff",flexShrink:0}},"GC"),
        el("span",null,
          el("span",{style:{display:"block",fontFamily:"var(--gc-font-display)",fontSize:17,fontWeight:600,color:"#fff",letterSpacing:"-.04em"}},"GymControl"),
          el("span",{style:{display:"block",marginTop:2,fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".22em",color:"#9199c8"}},"Panel operativo")
        )
      ),
      el("nav",{style:{flex:1,display:"flex",flexDirection:"column",gap:18}},
        sections.map(([sLabel,items])=>el("section",{key:sLabel},
          el("span",{className:"gc-eyebrow",style:{display:"block",padding:"0 11px 8px"}},sLabel),
          el("div",{style:{display:"flex",flexDirection:"column",gap:2}},
            items.map(it=>el("button",{key:it.k,className:"nav-item"+(it.active?" active":"")},
              el("span",{className:"nav-icon"},el(Ic,{d:it.ic,size:15})),it.l
            ))
          )
        ))
      ),
      el("div",{style:{paddingTop:16,display:"flex",flexDirection:"column",gap:8}},
        el("div",{style:{borderRadius:12,border:"1px solid #151c2e",background:"#0a0d16",padding:"12px 14px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:8}},
            el("span",{style:{width:6,height:6,borderRadius:99,background:"#7c4dff",boxShadow:"0 0 9px rgba(109,64,239,.7)",flexShrink:0}}),
            el("span",{style:{fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".22em",color:"#8d67f2"}},"Sesión activa")
          ),
          el("div",{style:{display:"flex",alignItems:"center",gap:9}},
            el("span",{style:{display:"grid",placeItems:"center",width:32,height:32,borderRadius:99,border:"1px solid #252b3f",background:"#06080f",fontFamily:"var(--gc-font-display)",fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}},"A"),
            el("div",null,
              el("p",{style:{margin:0,fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".15em",color:"#97a0c4"}},"Admin"),
              el("p",{style:{margin:"2px 0 0",fontSize:11.5,color:"#b5bdd3"}},"admin@gymcontrol.com")
            )
          )
        ),
        el("button",{style:{display:"flex",alignItems:"center",gap:9,height:40,width:"100%",padding:"0 11px",borderRadius:11,border:"1px solid #3b2775",background:"#1a1230",color:"#fff",cursor:"pointer",fontFamily:"var(--gc-font-display)",fontSize:13.5,fontWeight:600}},
          el("span",{style:{display:"grid",placeItems:"center",width:26,height:26,borderRadius:7,border:"1px solid #4a3191",background:"#201641",color:"#a57dff",flexShrink:0}},el(Ic,{d:I.logout,size:12})),
          "Cerrar sesión"
        )
      )
    );
  }

  /* ── ExRow ── */
  function ExRow({ ex, onEdit, onDelete }) {
    const mb = (MTHEME[ex.muscle]||MTHEME["Core"]).badge;
    const eb = {bc:"var(--gc-border-strong)",bg:"rgba(23,29,42,.6)",tc:"var(--gc-foreground-muted)"};
    return el("tr",null,
      el("td",null,
        el("div",{style:{display:"flex",alignItems:"center",gap:12}},
          el("div",{style:{width:42,height:34,borderRadius:8,border:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",background:(MTHEME[ex.muscle]||MTHEME["Core"]).grad,flexShrink:0}},
            el(Ic,{d:I.dumbbell,size:13,color:"rgba(255,255,255,.2)"})
          ),
          el("div",null,
            el("div",{style:{fontSize:13.5,fontWeight:600,color:"#fff"}},ex.name),
            el("div",{style:{fontSize:12,color:"var(--gc-foreground-muted)",marginTop:2}},ex.desc)
          )
        )
      ),
      el("td",null,el("span",{className:"badge",style:{borderColor:mb.bc,background:mb.bg,color:mb.tc}},ex.muscle)),
      el("td",null,el("span",{className:"badge",style:{borderColor:eb.bc,background:eb.bg,color:eb.tc}},ex.equip)),
      el("td",{style:{color:"var(--gc-foreground-subtle)",fontSize:12.5,fontFamily:"var(--gc-font-mono)"}},ex.date),
      el("td",null,
        el("div",{style:{display:"flex",gap:5}},
          el("button",{className:"act-btn",title:"Editar",onClick:onEdit,style:{color:"var(--gc-foreground-subtle)"}},el(Ic,{d:I.pencil,size:13})),
          el("button",{className:"act-btn",title:"Eliminar",onClick:onDelete,style:{color:"var(--gc-foreground-subtle)"}},el(Ic,{d:I.trash,size:13}))
        )
      )
    );
  }

  /* ── Toast ── */
  function Toast({ msg }) {
    return el("div",{className:"toast"},el("span",{style:{color:"#4ade80"}},el(Ic,{d:I.check,size:15})),msg);
  }

  /* ── App ── */
  function App() {
    const [exercises, setExercises] = useState(INIT);
    const [drawer,  setDrawer]  = useState({ mode:"create" });
    const [form,    setForm]    = useState(BLANK);
    const [delEx,   setDelEx]   = useState(null);
    const [toast,   setToast]   = useState(null);
    const [search,  setSearch]  = useState("");

    const filtered = useMemo(()=>{
      if (!search.trim()) return exercises;
      const q = search.toLowerCase();
      return exercises.filter(e=>e.name.toLowerCase().includes(q));
    },[exercises,search]);

    function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),2500); }

    function openCreate(){ setForm({...BLANK}); setDrawer({mode:"create"}); }
    function openEdit(ex){ setForm({name:ex.name,desc:ex.desc,muscle:ex.muscle,equip:ex.equip,video:ex.video||""}); setDrawer({mode:"edit",ex}); }

    function handleSave(){
      if (!form.name.trim()) return;
      if (drawer.mode==="create"){
        setExercises(p=>[{id:Date.now(),...form,date:new Date().toISOString().slice(0,10)},...p]);
        showToast("Ejercicio creado.");
      } else {
        setExercises(p=>p.map(e=>e.id===drawer.ex.id?{...e,...form}:e));
        showToast("Cambios guardados.");
      }
      setDrawer(null);
    }

    function handleDelete(){
      setExercises(p=>p.filter(e=>e.id!==delEx.id));
      setDelEx(null);
      showToast("Ejercicio eliminado.");
    }

    return el("div",{className:"shell"},
      el(Sidebar),
      el("main",{className:"main"},
        el("header",{style:{marginBottom:22}},
          el(Eyebrow,{tone:"accent"},"Gestión / Ejercicios"),
          el("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between",gap:16,marginTop:5}},
            el("div",null,
              el("h1",{className:"page-title"},"Ejercicios"),
              el("p",{className:"page-desc"},"Gestioná el catálogo completo de ejercicios.")
            ),
            el("div",{style:{display:"flex",gap:8,alignItems:"center"}},
              el("div",{className:"mode-toggle"},
                el("button",{className:"mode-btn"+(drawer&&drawer.mode==="create"?" on":""),onClick:openCreate},"+ Nuevo"),
                drawer?.ex && el("button",{className:"mode-btn on"},el(Ic,{d:I.pencil,size:10})," Editando")
              ),
              el("button",{className:"btn-add",onClick:openCreate},el(Ic,{d:I.plus,size:15}),"Nuevo ejercicio")
            )
          )
        ),
        el("div",{className:"filter-bar"},
          el("div",{className:"search-wrap"},
            el("span",{className:"search-icon"},el(Ic,{d:I.search,size:14})),
            el("input",{className:"search-input",placeholder:"Buscar ejercicio...",value:search,onChange:e=>setSearch(e.target.value)})
          ),
          el("span",{style:{marginLeft:"auto",fontSize:12.5,color:"var(--gc-foreground-subtle)"}},filtered.length+" ejercicio"+(filtered.length!==1?"s":""))
        ),
        el("div",{className:"table-card"},
          el("table",{className:"ex-table"},
            el("thead",null,
              el("tr",null,
                el("th",{style:{width:"38%"}},"Ejercicio"),
                el("th",null,"Grupo muscular"),
                el("th",null,"Equipamiento"),
                el("th",null,"Agregado"),
                el("th",{style:{width:80}},"")
              )
            ),
            el("tbody",null,
              filtered.map(ex=>el(ExRow,{key:ex.id,ex,onEdit:()=>openEdit(ex),onDelete:()=>setDelEx(ex)}))
            )
          )
        )
      ),
      drawer && el(FormDrawer,{mode:drawer.mode,form,setForm,onClose:()=>setDrawer(null),onSave:handleSave}),
      delEx  && el(DeleteConfirm,{exercise:delEx,onClose:()=>setDelEx(null),onConfirm:handleDelete}),
      toast  && el(Toast,{msg:toast})
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(el(App));
})();
</script>
</body>
</html>
