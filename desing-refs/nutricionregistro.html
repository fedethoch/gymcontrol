// ── Donut chart ────────────────────────────────────────────────────────────
function DonutChart({ value, max }) {
  const r = 68, cx = 88, cy = 88;
  const circ = 2 * Math.PI * r;
  const pct  = Math.min(value / max, 1);
  const dash = circ * pct;
  const gap  = circ - dash;

  return (
    <div style={{ position:"relative", width:176, height:176 }}>
      <svg width={176} height={176} viewBox="0 0 176 176">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stopColor="#9333ea" />
            <stop offset="100%" stopColor="#b995ff" />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1a2035" strokeWidth={14} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="url(#ringGrad)" strokeWidth={14}
          strokeDasharray={`${dash} ${gap}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{ transition:"stroke-dasharray 0.6s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center", gap:1 }}>
        <span style={{ fontFamily:"var(--gc-font-display)", fontSize:28, fontWeight:700,
            color:"#fff", lineHeight:1.1 }}>{value.toLocaleString("es")}</span>
        <span style={{ fontSize:12, color:"#98a2b7" }}>kcal</span>
        <span style={{ fontSize:17, fontWeight:700, color:"#b995ff", lineHeight:1.3 }}>
          {Math.round(pct * 100)}%
        </span>
        <span style={{ fontSize:11, color:"#6e7788" }}>del objetivo</span>
      </div>
    </div>
  );
}

// ── Progress row ───────────────────────────────────────────────────────────
function ProgressRow({ icon, label, value, max, unit }) {
  const pct = Math.min((value / max) * 100, 100);
  const display = unit === "kcal"
    ? `${value.toLocaleString("es")} / ${max.toLocaleString("es")} kcal`
    : `${value} / ${max} g`;

}

// ── Heatmap ────────────────────────────────────────────────────────────────
function NutritionHeatmap() {
  const TOTAL=77, APRIL=5, MAY=6, ROWS=7;
  const colors = ["#1a2035","#2d1b5e","#6335e8","#9a63ff"];
  const dayLabels = ["L","M","M","J","V","S","D"];

  const levels = Array.from({ length:TOTAL }, (_,i) => {
    const d = TOTAL - 1 - i;
    if (d < 8)  return 3;
    if (d < 20) { const r=(i*17+3)%10; return r<1?0:r<3?1:r<6?2:3; }
    const r=(i*13+7)%10; return r<2?0:r<4?1:r<7?2:3;
  });

  const Cols = ({ startCol, numCols }) =>
    Array.from({ length:numCols }, (_,ci) => (
      <div key={ci} style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {Array.from({ length:ROWS }, (_,di) => {
          const idx = (startCol+ci)*ROWS+di;
          return <div key={di} style={{ width:14, height:14, borderRadius:3,
            background: idx < levels.length ? colors[levels[idx]] : "#1a2035" }} />;
        })}
      </div>
    ));

  return (
    <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
      <div style={{ display:"flex", flexDirection:"column", gap:4, paddingTop:20 }}>
        {dayLabels.map((d,i) => (
          <div key={i} style={{ height:14, lineHeight:"14px", fontSize:10,
              color:"#6e7788", textAlign:"right", paddingRight:4 }}>{d}</div>
        ))}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        <div style={{ fontSize:11, color:"#98a2b7", paddingLeft:2 }}>Abril</div>
        <div style={{ display:"flex", gap:4 }}><Cols startCol={0} numCols={APRIL} /></div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        <div style={{ fontSize:11, color:"#98a2b7", paddingLeft:2 }}>Mayo</div>
        <div style={{ display:"flex", gap:4 }}><Cols startCol={APRIL} numCols={MAY} /></div>
      </div>
    </div>
  );
}

          <h1 style={{ margin:0, fontFamily:"var(--gc-font-display)", fontSize:32,
              fontWeight:600, letterSpacing:"-0.06em", color:"#fff" }}>
            Registro diario de comidas
          </h1>
          <p style={{ margin:"6px 0 0", fontSize:14, color:"#98a2b7" }}>
            Registra lo que comiste hoy y compara el total contra tu objetivo diario.
          </p>
        </div>
        {/* date nav */}
        <div style={{ display:"flex", alignItems:"center", background:"var(--gc-card)",
            border:"1px solid var(--gc-border)", borderRadius:10, overflow:"hidden" }}>
          <button onClick={()=>setDateOffset(d=>d-1)} style={{ background:"none", border:"none",
              borderRight:"1px solid var(--gc-border)", padding:"10px 14px", cursor:"pointer",
              color:"#98a2b7", fontSize:20, lineHeight:1, display:"flex", alignItems:"center" }}>
            ‹
          </button>
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 18px" }}>
            <span style={{ fontSize:14 }}>📅</span>
            <span style={{ fontSize:14, color:"#d6dbe7", fontWeight:500, whiteSpace:"nowrap" }}>
              {dateCap}
            </span>
          </div>
          <button onClick={()=>setDateOffset(d=>d+1)} style={{ background:"none", border:"none",
              borderLeft:"1px solid var(--gc-border)", padding:"10px 14px", cursor:"pointer",
              color:"#98a2b7", fontSize:20, lineHeight:1, display:"flex", alignItems:"center" }}>
            ›
          </button>
        </div>
      </div>

      {/* ── 2-col grid: form + resumen ── */}
      <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1.2fr) minmax(300px,1fr)",
          gap:20, alignItems:"start" }}>

        {/* left: Nueva comida */}
        <div style={{ background:"var(--gc-card)", border:"1px solid var(--gc-border)",
            borderRadius:20, padding:24, display:"flex", flexDirection:"column", gap:18 }}>

          {/* title */}
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ display:"grid", placeItems:"center", width:44, height:44,
                borderRadius:12, background:"var(--gc-accent-soft-surface)",
                border:"1px solid var(--gc-accent-soft-border)", fontSize:20 }}>🍽️</span>
            <div>
              <div style={{ fontFamily:"var(--gc-font-display)", fontWeight:600,
                  fontSize:18, color:"#fff" }}>Nueva comida</div>
              <div style={{ fontSize:13, color:"#98a2b7", marginTop:2 }}>
                Agrega los alimentos que consumiste y guarda tu comida.
              </div>
            </div>
          </div>

          {/* nombre */}
          <div>
            <Label>Nombre de la comida</Label>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:12, top:"50%",
                  transform:"translateY(-50%)", fontSize:14, pointerEvents:"none" }}>📅</span>
              <input value={mealName} onChange={e=>setMealName(e.target.value)}
                style={{ ...inp, paddingLeft:36 }} />
            </div>
          </div>

          {/* search + unit + qty + add */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 110px 110px auto",
              gap:10, alignItems:"end" }}>
            {/* search */}
            <div ref={searchRef} style={{ position:"relative" }}>
              <Label>Buscar alimento</Label>
              <div style={{ position:"relative" }}>
                <span style={{ position:"absolute", left:12, top:"50%",
                    transform:"translateY(-50%)", fontSize:12, color:"#6e7788",
                    pointerEvents:"none" }}>🔍</span>
                <input value={searchQ}
                  onChange={e=>{ setSearchQ(e.target.value); setShowDrop(true); }}
                  onFocus={()=>setShowDrop(true)}
                  placeholder="Buscar alimento..."
                  style={{ ...inp, paddingLeft:34 }} />
              </div>
              {showDrop && searchQ && (
                <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, right:0,
                    zIndex:20, background:"#141b28", border:"1px solid var(--gc-border)",
                    borderRadius:10, overflow:"hidden" }}>
                  {filtered.slice(0,6).map((f,i) => (
                    <div key={i}
                      onClick={()=>{ setSelectedF(f); setSearchQ(f.name); setShowDrop(false); }}
                      style={{ padding:"10px 14px", cursor:"pointer", display:"flex",
                        justifyContent:"space-between", alignItems:"center", fontSize:13,
                        color:"#d6dbe7", borderBottom: i<5?"1px solid var(--gc-border)":"none" }}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(124,58,237,0.1)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span>{f.emoji}</span><span>{f.name}</span>
                      </div>
                      <span style={{ fontSize:12, color:"#6e7788" }}>{f.kcal} kcal/100g</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {/* unit */}
            <div>
              <Label>Unidad</Label>
              <select value={unit} onChange={e=>setUnit(e.target.value)}
                style={{ ...inp, cursor:"pointer" }}>
                <option>Gramos</option><option>ml</option>
                <option>Unidad</option><option>Taza</option>
              </select>
            </div>
            {/* qty */}
            <div>
              <Label>Cantidad</Label>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <input type="number" value={qty} min={1}
                  onChange={e=>setQty(Number(e.target.value))}
                  style={{ ...inp, width:68 }} />
                <span style={{ color:"#6e7788", fontSize:13 }}>g</span>
              </div>
            </div>
            {/* add btn */}
            <button onClick={addFood} style={{ display:"flex", alignItems:"center", gap:6,
                padding:"10px 16px", borderRadius:10, background:"var(--gc-card-alt)",
                border:"1px solid var(--gc-border-strong)", color:"#fff", cursor:"pointer",
                fontSize:13, fontWeight:600, whiteSpace:"nowrap",
                fontFamily:"var(--gc-font-body)", height:42 }}>
              <PlusIcon size={14} /> Agregar
            </button>
          </div>

          {/* added foods table */}
          {addedFoods.length > 0 && (
            <div>
              <div style={{ fontSize:13, color:"#6e7788", marginBottom:8 }}>
                Alimentos agregados ({addedFoods.length})
              </div>
              <div style={{ border:"1px solid var(--gc-border)", borderRadius:12, overflow:"hidden" }}>
                <div style={{ display:"grid",
                    gridTemplateColumns:"1fr 70px 90px 44px 44px 44px 32px",
                    padding:"7px 14px", background:"var(--gc-card-alt)",
                    borderBottom:"1px solid var(--gc-border)", fontSize:11, fontWeight:600,
                    color:"#6e7788", textTransform:"uppercase", letterSpacing:"0.08em" }}>
                  {["Alimento","Cantidad","Calorías","P","C","G",""].map((h,i) =>
                    <span key={i}>{h}</span>
                  )}
                </div>
                {addedFoods.map((f,i) => (
                  <div key={i} style={{ display:"grid",
                      gridTemplateColumns:"1fr 70px 90px 44px 44px 44px 32px",
                      padding:"10px 14px", borderTop:"1px solid var(--gc-border)",
                      alignItems:"center", fontSize:13 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:7, color:"#d6dbe7" }}>
                      <span>{f.emoji}</span><span>{f.name}</span>
                    </div>
                    <span style={{ color:"#98a2b7" }}>{f.qty} g</span>
                    <span style={{ color:"#98a2b7" }}>{f.kcal} kcal</span>
                    <span style={{ color:"#98a2b7" }}>{f.p} g</span>
                    <span style={{ color:"#98a2b7" }}>{f.c} g</span>
                    <span style={{ color:"#98a2b7" }}>{f.g} g</span>
                    <button onClick={()=>setAddedFoods(p=>p.filter((_,j)=>j!==i))}
                      style={{ background:"none", border:"none", cursor:"pointer",
                        color:"#6e7788", display:"flex", padding:4, borderRadius:4 }}>
                      <TrashIcon size={13} />
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* save */}
          <button onClick={saveMeal} style={{ width:"100%", padding:12, borderRadius:12,
              background: addedFoods.length ? "var(--gc-accent)" : "var(--gc-card-alt)",
              border:"none",
              cursor: addedFoods.length ? "pointer" : "not-allowed",
              color: addedFoods.length ? "#fff" : "#6e7788",
              fontSize:15, fontWeight:600, display:"flex", alignItems:"center",
              justifyContent:"center", gap:8, fontFamily:"var(--gc-font-body)",
              transition:"all 0.2s" }}>
            <SaveIcon size={16} /> Guardar comida
          </button>
        </div>

        {/* right: Resumen */}
        <div style={{ background:"var(--gc-card)", border:"1px solid var(--gc-border)",
            borderRadius:20, padding:24, display:"flex", flexDirection:"column", gap:20 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontFamily:"var(--gc-font-display)", fontWeight:600,
                  fontSize:18, color:"#fff" }}>Resumen nutricional del día</div>
              <div style={{ fontSize:13, color:"#98a2b7", marginTop:2 }}>
                Así vas hoy frente a tu objetivo diario.
              </div>
            </div>
            <button style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 12px",
                borderRadius:8, background:"var(--gc-card-alt)", border:"1px solid var(--gc-border)",
                color:"#d6dbe7", cursor:"pointer", fontSize:13, fontWeight:500,
                fontFamily:"var(--gc-font-body)", whiteSpace:"nowrap" }}>
              ✏️ Editar objetivos
            </button>
          </div>

          <div style={{ display:"flex", gap:20, alignItems:"center" }}>
            <div style={{ flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center" }}>
              <DonutChart value={totals.kcal} max={GOALS.kcal} />
              <div style={{ fontSize:12, color:"#6e7788", marginTop:4 }}>
                Objetivo: {GOALS.kcal.toLocaleString("es")} kcal
              </div>
            </div>
            <div style={{ flex:1, display:"flex", flexDirection:"column", gap:14 }}>
              <ProgressRow icon="🔥" label="Calorías"      value={totals.kcal} max={GOALS.kcal} unit="kcal" />
              <ProgressRow icon="💛" label="Proteína"      value={totals.p}    max={GOALS.p}    unit="g" />
              <ProgressRow icon="🌿" label="Carbohidratos" value={totals.c}    max={GOALS.c}    unit="g" />
              <ProgressRow icon="💧" label="Grasas"        value={totals.g}    max={GOALS.g}    unit="g" />
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12,
              paddingTop:16, borderTop:"1px solid var(--gc-border)" }}>
            {[["📊","Días registrados","12 / 16 días"],
              ["📈","Promedio diario","1,598 kcal"],
              ["🎯","Racha actual","8 días 🔥"]].map(([icon,lbl,val]) => (
              <div key={lbl} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:20 }}>{icon}</span>
                <div>
                  <div style={{ fontSize:10, color:"#6e7788", textTransform:"uppercase",
                      letterSpacing:"0.1em", fontWeight:600 }}>{lbl}</div>
                  <div style={{ fontSize:15, fontWeight:700, color:"#fff",
                      fontFamily:"var(--gc-font-display)", marginTop:2 }}>{val}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Comidas de hoy ── */}
      <div>
        <div style={{ display:"flex", justifyContent:"space-between",
            alignItems:"center", marginBottom:16 }}>
          <div>
            <div style={{ fontFamily:"var(--gc-font-display)", fontWeight:600,
                fontSize:20, color:"#fff" }}>Comidas de hoy</div>
            <div style={{ fontSize:13, color:"#98a2b7", marginTop:2 }}>
              Tus comidas registradas para hoy.
            </div>
          </div>
          <button style={{ display:"flex", alignItems:"center", gap:6, padding:"9px 16px",
              borderRadius:10, background:"var(--gc-card)", border:"1px solid var(--gc-border)",
              color:"#fff", cursor:"pointer", fontSize:14, fontWeight:600,
              fontFamily:"var(--gc-font-body)" }}>
            <PlusIcon size={14} /> Nueva comida
          </button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:14 }}>
          {meals.map(m => (
            <MealCard key={m.id} meal={m}
              onToggle={()=>setMeals(p=>p.map(x=>x.id===m.id?{...x,expanded:!x.expanded}:x))}
              onDelete={()=>setMeals(p=>p.filter(x=>x.id!==m.id))}
              onEdit={()=>{}} />
          ))}
        </div>
      </div>

      {/* ── Constancia ── */}
      <div style={{ background:"var(--gc-card)", border:"1px solid var(--gc-border)",
          borderRadius:20, padding:24, display:"grid",
          gridTemplateColumns:"auto 1fr auto", gap:32, alignItems:"center" }}>
        <div style={{ minWidth:180 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
            <span style={{ fontSize:18 }}>⭐</span>
            <div style={{ fontFamily:"var(--gc-font-display)", fontWeight:600,
                fontSize:16, color:"#fff" }}>Constancia nutricional</div>
          </div>
          <div style={{ fontSize:13, color:"#98a2b7", marginBottom:16 }}>
            Tu consistencia en el registro de comidas.
          </div>
          <div style={{ display:"flex", gap:20 }}>
            <div>
              <div style={{ fontFamily:"var(--gc-font-display)", fontSize:26,
                  fontWeight:700, color:"#b995ff" }}>8 días</div>
              <div style={{ fontSize:12, color:"#98a2b7" }}>Racha actual</div>
            </div>
            <div>
              <div style={{ fontFamily:"var(--gc-font-display)", fontSize:26,
                  fontWeight:700, color:"#b995ff" }}>12 días</div>
              <div style={{ fontSize:12, color:"#98a2b7" }}>Registrados este mes</div>
            </div>
          </div>
        </div>

        <NutritionHeatmap />

        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {[["#9a63ff","Registro completo"],["#3b1d72","Registro parcial"],
            ["#1a2035","Sin registro"]].map(([color,lbl]) => (
            <div key={lbl} style={{ display:"flex", alignItems:"center",
                gap:8, fontSize:13, color:"#98a2b7" }}>
              <span style={{ width:14, height:14, borderRadius:3, background:color,
                  flexShrink:0, display:"inline-block" }} />
              {lbl}
            </div>
          ))}
        </div>
      </div>

      {/* bottom padding */}
      <div style={{ height:24 }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NutricionRegistro />);
</script>
</body>
</html>
